<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie — SalesControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <header class="auth-header">
        <a class="logo" href="index.html">SalesControl</a>
        <a class="auth-back" href="index.html">← Strona główna</a>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">Logowanie</h1>
            <p class="auth-lead">Wersja demonstracyjna: konto zapisuje się tylko w tej przeglądarce (localStorage). Bez serwera.</p>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-row">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" name="email" autocomplete="username" required placeholder="jan@firma.pl">
                </div>
                <div class="form-row">
                    <label for="login-password">Hasło</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required minlength="8" placeholder="Minimum 8 znaków">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginSubmit">Zaloguj</button>
                <p class="form-status" id="loginStatus" role="status" aria-live="polite"></p>
            </form>

            <p class="auth-footer-line">Nie masz konta? <a href="rejestracja.html">Załóż konto</a></p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var nextUrl = window.SCAuth.getSafeNextUrl(params.get("next"));
            if (params.get("registered") === "1") {
                var st = document.getElementById("loginStatus");
                if (st) {
                    st.style.color = "#7dd3fc";
                    st.textContent = "Konto utworzone. Możesz się zalogować.";
                }
            }
            var form = document.getElementById("loginForm");
            var statusEl = document.getElementById("loginStatus");
            form.addEventListener("submit", function (e) {
                e.preventDefault();
                var email = document.getElementById("login-email").value;
                var password = document.getElementById("login-password").value;
                statusEl.textContent = "Logowanie…";
                statusEl.style.color = "#94a3b8";
                window.SCAuth.loginUser(email, password)
                    .then(function (res) {
                        if (res.ok) {
                            statusEl.style.color = "#86efac";
                            statusEl.textContent = "Zalogowano. Przekierowanie…";
                            window.location.href = nextUrl;
                        } else {
                            statusEl.style.color = "#fca5a5";
                            statusEl.textContent = res.error || "Błąd logowania.";
                        }
                    })
                    .catch(function () {
                        statusEl.style.color = "#fca5a5";
                        statusEl.textContent =
                            "Nie można zalogować w tym trybie. Użyj serwera lokalnego (np. http://localhost:8080), nie file://.";
                    });
            });
        })();
    </script>
</body>
</html>
