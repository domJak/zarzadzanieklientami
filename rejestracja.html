<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja — SalesControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <header class="auth-header">
        <a class="logo" href="index.html">SalesControl</a>
        <a class="auth-back" href="index.html">← Strona główna</a>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">Rejestracja</h1>
            <p class="auth-lead">Utwórz konto demo. Hasło jest przechowywane jako skrót SHA-256 wyłącznie po stronie przeglądarki — to nie zastępuje prawdziwej autoryzacji na serwerze.</p>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-row">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" name="email" autocomplete="email" required placeholder="jan@firma.pl">
                </div>
                <div class="form-row">
                    <label for="reg-password">Hasło</label>
                    <input type="password" id="reg-password" name="password" autocomplete="new-password" required minlength="8" placeholder="Minimum 8 znaków">
                </div>
                <div class="form-row">
                    <label for="reg-password2">Powtórz hasło</label>
                    <input type="password" id="reg-password2" name="password2" autocomplete="new-password" required minlength="8" placeholder="Powtórz hasło">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="regSubmit">Utwórz konto</button>
                <p class="form-status" id="regStatus" role="status" aria-live="polite"></p>
            </form>

            <p class="auth-footer-line">Masz już konto? <a href="logowanie.html">Zaloguj się</a></p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        (function () {
            var form = document.getElementById("registerForm");
            var statusEl = document.getElementById("regStatus");
            form.addEventListener("submit", function (e) {
                e.preventDefault();
                var email = document.getElementById("reg-email").value;
                var p1 = document.getElementById("reg-password").value;
                var p2 = document.getElementById("reg-password2").value;
                if (p1 !== p2) {
                    statusEl.style.color = "#fca5a5";
                    statusEl.textContent = "Hasła muszą być takie same.";
                    return;
                }
                if (p1.length < 8) {
                    statusEl.style.color = "#fca5a5";
                    statusEl.textContent = "Hasło musi mieć co najmniej 8 znaków.";
                    return;
                }
                statusEl.style.color = "#94a3b8";
                statusEl.textContent = "Tworzenie konta…";
                window.SCAuth.registerUser(email, p1)
                    .then(function (res) {
                        if (res.ok) {
                            window.location.href =
                                "logowanie.html?registered=1&next=" + encodeURIComponent("panel-demo.html");
                        } else {
                            statusEl.style.color = "#fca5a5";
                            statusEl.textContent = res.error || "Nie udało się zarejestrować.";
                        }
                    })
                    .catch(function () {
                        statusEl.style.color = "#fca5a5";
                        statusEl.textContent =
                            "Rejestracja wymaga bezpiecznego kontekstu. Uruchom stronę przez http://localhost, nie file://.";
                    });
            });
        })();
    </script>
</body>
</html>
